{{- if and .Values.services.agent.sandbox.enabled .Values.services.agent.warmPool.enabled }}
# =============================================================================
# Sandbox Warm Pool - Pre-warmed pods for instant sandbox provisioning
# =============================================================================
# Reduces sandbox startup from ~30-60s to <2s by maintaining a pool of ready pods.
#
# Architecture:
# 1. SandboxWarmPool maintains N warm pods from the SandboxTemplate
# 2. When investigation starts, a SandboxClaim binds to a warm pod (<1s)
# 3. Server calls /claim endpoint to inject JWT and tenant context
# 4. Pool controller replenishes claimed pods automatically
#
# Key difference from direct Sandbox creation:
# - Envoy uses Lua filter to read JWT from file (not static header)
# - Placeholder env vars are set at claim time via /claim endpoint
# - Shared emptyDir volume for JWT injection between agent and Envoy
# =============================================================================

---
# Envoy ConfigMap for warm pool pods
# Uses Lua filter to dynamically read JWT from /tmp/sandbox-jwt
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-warmpool-config
  namespace: {{ .Values.namespace }}
  labels:
    app: incidentfox
    component: envoy-warmpool
    {{- include "incidentfox.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901

    static_resources:
      listeners:
      - name: http_proxy
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8001
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: credential_proxy
              codec_type: AUTO

              http_protocol_options:
                allow_absolute_url: true

              route_config:
                name: proxy_routes
                virtual_hosts:
                - name: localhost_proxy
                  domains:
                  - "localhost:8001"
                  - "127.0.0.1:8001"
                  - "localhost"
                  routes:
                  # LLM API paths -> credential-resolver LLM proxy
                  - match:
                      prefix: "/v1/"
                    route:
                      cluster: credential_resolver_llm
                      timeout: 0s
                      idle_timeout: 0s
                  - match:
                      prefix: "/api/event_logging/"
                    route:
                      cluster: credential_resolver_llm
                      timeout: 0s
                      idle_timeout: 0s
                  # Coralogix API paths
                  - match:
                      prefix: "/api/v1/dataprime/"
                    route:
                      cluster: coralogix_us2
                      auto_host_rewrite: true
                  - match:
                      prefix: "/api/v1/query"
                    route:
                      cluster: coralogix_us2
                      auto_host_rewrite: true

                - name: anthropic
                  domains:
                  - "api.anthropic.com"
                  - "api.anthropic.com:443"
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: credential_resolver_llm
                      timeout: 0s
                      idle_timeout: 0s

                - name: coralogix_us2
                  domains:
                  - "api.us2.coralogix.com"
                  - "api.us2.coralogix.com:443"
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: coralogix_us2
                      auto_host_rewrite: true

                - name: passthrough
                  domains:
                  - "*"
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: passthrough_cluster
                      auto_host_rewrite: true

              http_filters:
              # Lua filter: Read JWT from file and add as header
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  default_source_code:
                    inline_string: |
                      function envoy_on_request(request_handle)
                        local f = io.open("/tmp/sandbox-jwt", "r")
                        if f then
                          local jwt = f:read("*all")
                          f:close()
                          jwt = jwt:gsub("^%s*(.-)%s*$", "%1")
                          if jwt ~= "" then
                            request_handle:headers():add("x-sandbox-jwt", jwt)
                          end
                        end
                      end

              # ext_authz filter - calls credential-resolver for auth headers
              - name: envoy.filters.http.ext_authz
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                  transport_api_version: V3
                  http_service:
                    server_uri:
                      uri: http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/check
                      cluster: ext_authz
                      timeout: 2s
                    path_prefix: "/extauthz"
                    authorization_request:
                      allowed_headers:
                        patterns:
                        - exact: "x-sandbox-jwt"
                        - exact: "x-tenant-id"
                        - exact: "x-team-id"
                      headers_to_add:
                      - key: "x-original-host"
                        value: "%REQ(:authority)%"
                    authorization_response:
                      allowed_upstream_headers:
                        patterns:
                        - exact: "authorization"
                        - exact: "x-api-key"
                        - exact: "x-tenant-id"
                        - exact: "x-team-id"
                        - exact: "x-llm-model"
                  failure_mode_allow: false

              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      # TLS listener for gh CLI (requires HTTPS)
      # Terminates TLS locally, forwards to credential-resolver HTTP
      - name: gh_tls_proxy
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8443
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: gh_tls_proxy
              codec_type: AUTO
              route_config:
                name: gh_routes
                virtual_hosts:
                - name: gh_proxy
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: credential_resolver_github
                      timeout: 30s
              http_filters:
              # Lua filter: Read JWT from file and add as header
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  default_source_code:
                    inline_string: |
                      function envoy_on_request(request_handle)
                        local f = io.open("/tmp/sandbox-jwt", "r")
                        if f then
                          local jwt = f:read("*all")
                          f:close()
                          jwt = jwt:gsub("^%s*(.-)%s*$", "%1")
                          if jwt ~= "" then
                            request_handle:headers():add("x-sandbox-jwt", jwt)
                          end
                        end
                      end
              - name: envoy.filters.http.ext_authz
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                  transport_api_version: V3
                  http_service:
                    server_uri:
                      uri: http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/check
                      cluster: ext_authz
                      timeout: 2s
                    path_prefix: "/extauthz"
                    authorization_request:
                      allowed_headers:
                        patterns:
                        - exact: "x-sandbox-jwt"
                      headers_to_add:
                      - key: "x-original-host"
                        value: "github.com"
                    authorization_response:
                      allowed_upstream_headers:
                        patterns:
                        - exact: "authorization"
                        - exact: "x-api-key"
                  failure_mode_allow: false
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                - certificate_chain:
                    filename: /etc/envoy/gh-tls/credential-resolver.crt
                  private_key:
                    filename: /etc/envoy/gh-tls/credential-resolver.key

      clusters:
      - name: ext_authz
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: ext_authz
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local
                    port_value: 8002

      - name: credential_resolver_llm
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: credential_resolver_llm
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local
                    port_value: 8002

      - name: anthropic
        type: LOGICAL_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: anthropic
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: api.anthropic.com
                    port_value: 443
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: api.anthropic.com

      - name: coralogix_us2
        type: LOGICAL_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: coralogix_us2
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: api.us2.coralogix.com
                    port_value: 443
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: api.us2.coralogix.com

      - name: passthrough_cluster
        type: LOGICAL_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: passthrough_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: localhost
                    port_value: 9999

      # GitHub API via credential-resolver (for gh CLI TLS proxy)
      - name: credential_resolver_github
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: credential_resolver_github
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local
                    port_value: 8002

---
