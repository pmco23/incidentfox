---
# SandboxTemplate - Pod template for warm pool
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: {{ .Values.services.agent.warmPool.templateName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: incidentfox
    component: warmpool-template
    {{- include "incidentfox.labels" . | nindent 4 }}
spec:
  podTemplate:
    metadata:
      labels:
        app: incidentfox-agent
        component: warmpool
        warmpool: "true"
        incidentfox.io/isolation: sandbox
    spec:
      serviceAccountName: {{ .Release.Name }}-sandbox-pod
      # Prevent sandbox from accessing the host cluster's K8s API.
      # All k8s queries must go through the k8s-gateway to customer clusters.
      automountServiceAccountToken: false
      {{- if .Values.services.agent.sandbox.useGvisor }}
      runtimeClassName: gvisor
      {{- end }}

      containers:
      # Main agent container
      - name: agent
        image: {{ .Values.services.agent.sandbox.image | default .Values.services.agent.image }}
        imagePullPolicy: Always
        ports:
        - containerPort: 8888
          name: sandbox
        env:
        # Placeholder values - set at claim time via /claim endpoint
        - name: INCIDENTFOX_TENANT_ID
          value: "unclaimed"
        - name: INCIDENTFOX_TEAM_ID
          value: "unclaimed"
        - name: THREAD_ID
          value: "unclaimed"
        # Config Service URL (must use correct namespace for DNS)
        - name: CONFIG_SERVICE_URL
          value: "http://incidentfox-config-service.{{ .Values.namespace }}.svc.cluster.local:8080"
        # Claude SDK: route API requests through Envoy proxy
        - name: ANTHROPIC_BASE_URL
          value: "http://localhost:8001"
        # Placeholder API key - Envoy injects real one via ext_authz
        - name: ANTHROPIC_API_KEY
          value: "sk-ant-placeholder-proxy-will-inject-real-key"
        # Coralogix SDK: route API requests through Envoy proxy
        - name: CORALOGIX_BASE_URL
          value: "http://localhost:8001"
        # Integration proxies: route through credential-resolver reverse proxy
        # These integrations have customer-specific URLs, so credential-resolver
        # looks up the real URL from config-service and injects auth headers.
        - name: CONFLUENCE_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/confluence"
        - name: GRAFANA_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/grafana"
        - name: ELASTICSEARCH_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/elasticsearch"
        - name: PROMETHEUS_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/prometheus"
        - name: JAEGER_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/jaeger"
        - name: GITHUB_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/github"
        - name: GITLAB_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/gitlab"
        - name: DATADOG_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/datadog"
        - name: AMPLITUDE_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/amplitude"
        - name: VERCEL_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/vercel"
        - name: SLACK_BASE_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/slack"
        # Credential resolver URL for SDK-based integrations (AWS, Azure, GCP)
        - name: CREDENTIAL_RESOLVER_URL
          value: "http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002"
        # Git URL rewriting: route github.com HTTPS through credential-resolver
        - name: GIT_CONFIG_COUNT
          value: "1"
        - name: GIT_CONFIG_KEY_0
          value: "url.http://credential-resolver-svc.{{ .Values.namespace }}.svc.cluster.local:8002/git/.insteadOf"
        - name: GIT_CONFIG_VALUE_0
          value: "https://github.com/"
        # gh CLI: route HTTPS API calls through Envoy TLS listener (localhost)
        - name: GH_HOST
          value: "localhost:8443"
        # gh CLI: placeholder token — Envoy ext_authz injects the real one
        # (same pattern as ANTHROPIC_API_KEY placeholder above)
        - name: GH_ENTERPRISE_TOKEN
          value: "placeholder-proxy-will-inject-real-token"
        # Trust the self-signed TLS cert used by the Envoy gh proxy listener.
        # Safe in sandbox: all external HTTPS is proxied through HTTP.
        - name: SSL_CERT_FILE
          value: "/etc/ssl/gh-proxy/credential-resolver.crt"
        # K8s Gateway: route K8s commands to customer clusters via k8s-agent
        - name: K8S_GATEWAY_URL
          value: "http://incidentfox-k8s-gateway.{{ .Values.namespace }}.svc.cluster.local:8085"
        # RAPTOR knowledge base: internal K8s service (no auth needed)
        - name: RAPTOR_URL
          value: "http://incidentfox-rag.{{ .Values.namespace }}.svc.cluster.local:8000"
        # flagd runtime config (for OTel Demo incident scenarios)
        - name: FLAGD_NAMESPACE
          value: "otel-demo"
        - name: FLAGD_CONFIGMAP
          value: "flagd-config"
        # =================================================================
        # Agent Observability (LLM tracing — Langfuse / Laminar)
        # =================================================================
        {{- $obs := .Values.services.agent.agentObservability }}
        {{- if and $obs (ne ($obs.backend | default "none") "none") }}
        - name: OBSERVABILITY_BACKEND
          value: {{ $obs.backend | quote }}
        {{- if eq $obs.backend "langfuse" }}
        - name: LANGFUSE_HOST
          value: {{ $obs.langfuse.host | default "https://us.cloud.langfuse.com" | quote }}
        - name: LANGFUSE_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $obs.langfuse.secretName }}
              key: {{ $obs.langfuse.publicKeyKey }}
        - name: LANGFUSE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $obs.langfuse.secretName }}
              key: {{ $obs.langfuse.secretKeyKey }}
        {{- else if eq $obs.backend "laminar" }}
        - name: LMNR_PROJECT_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $obs.laminar.secretName }}
              key: {{ $obs.laminar.apiKeyKey }}
        {{- end }}
        {{- end }}
        # Disable Laminar's claude-agent-sdk instrumentation
        - name: DISABLE_LAMINAR
          value: "true"
        # Kubernetes: use in-cluster service account auth (incidentfox-sandbox-pod SA)
        # NOT kubeconfig — that resolves to the EC2 node IAM identity via aws eks get-token
        - name: SANDBOX_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        # Shared volume for JWT injection (Envoy reads, /claim writes)
        - name: jwt-volume
          mountPath: /tmp
        # Self-signed TLS cert for gh CLI → Envoy proxy (agent needs to trust it)
        - name: gh-tls-cert
          mountPath: /etc/ssl/gh-proxy
          readOnly: true
        resources:
{{ toYaml .Values.services.agent.warmPool.agentResources | indent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

      # Envoy sidecar - handles credential injection via ext_authz
      - name: envoy
        image: {{ .Values.services.agent.warmPool.envoyImage }}
        args:
        - "--config-path"
        - "/etc/envoy/envoy.yaml"
        - "--log-level"
        - "warn"
        ports:
        - containerPort: 8001
          name: proxy
        - containerPort: 8443
          name: gh-tls
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
        - name: gh-tls-cert
          mountPath: /etc/envoy/gh-tls
          readOnly: true
        - name: jwt-volume
          mountPath: /tmp
        resources:
{{ toYaml .Values.services.agent.warmPool.envoyResources | indent 10 }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

      volumes:
      - name: envoy-config
        configMap:
          name: envoy-warmpool-config
      - name: gh-tls-cert
        configMap:
          name: envoy-gh-tls-cert
      - name: jwt-volume
        emptyDir:
          sizeLimit: 1Mi

---
# SandboxWarmPool - Maintains pre-warmed pods
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: {{ .Values.services.agent.warmPool.poolName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: incidentfox
    component: warmpool
    {{- include "incidentfox.labels" . | nindent 4 }}
spec:
  sandboxTemplateRef:
    name: {{ .Values.services.agent.warmPool.templateName }}
  replicas: {{ .Values.services.agent.warmPool.replicas }}

{{- end }}
